<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | POTRO PATROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/home.css">
    <style>
        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 900px;
            margin: 2rem auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .admin-container h1 { color: #3b3b98; text-align: center; margin-bottom: 1.5rem; }
        .users-table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
        .users-table th, .users-table td {
            padding: 0.85rem 1rem;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;;
            color: #333;
        }
        .users-table th { background: #3b3b98; color: white; font-weight: 700; }
        .users-table tr:hover { background: #f5f5ff;; }
        .badge-role {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-admin { background: #f59e0b; color: #000; }
        .badge-player { background: #3b82f6; color: #fff; }
        .badge-active { background: #22c55e; color: #fff; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; }
        .badge-inactive { background: #ef4444; color: #fff; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; }
        .btn-back {
            display: inline-block;
            margin: 1rem 2rem;
            padding: 0.5rem 1.5rem;
            background: white;
            color: #333;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="background-container">
        <a href="{{ url_for('home') }}" class="btn-back">← Volver</a>
        <div class="admin-container">
            <h1>👥 Gestión de Usuarios</h1>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            <span class="badge-role {{ 'badge-admin' if user.role == 'admin' else 'badge-player' }}">
                                {{ user.role }}
                            </span>
                        </td>
                        <td>
                            {% if user.is_active %}
                                <span class="badge-active">Activo</span>
                            {% else %}
                                <span class="badge-inactive">Inactivo</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
